services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=SEALDB;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True"
      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "SEAL.API"
      Jwt__Audience: "SEAL.API.Users"
      Jwt__ExpireDays: "7"
      Cors__AllowedOrigins__0: "http://localhost:3000"
      Auth__CookieSameSite: "Lax"
    depends_on:
      - sqlserver
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: "http://localhost:8080/api"
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8080/api"
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  sqlserver-data:
