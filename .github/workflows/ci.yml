name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore backend
        run: dotnet restore Backend/Tests/SEAL.NET.Tests/SEAL.NET.Tests.csproj
      - name: Build backend
        run: dotnet build Backend/Tests/SEAL.NET.Tests/SEAL.NET.Tests.csproj --no-restore
      - name: Test backend
        run: dotnet test Backend/Tests/SEAL.NET.Tests/SEAL.NET.Tests.csproj --no-build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Test frontend
        run: npm run test
      - name: Build frontend
        run: npm run build
